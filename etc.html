<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETC - Locuras Interactivas</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #0a0515; 
            color: #fff; 
            font-family: 'Outfit', sans-serif; 
        }
        canvas { 
            display: block; 
        }
        #ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            letter-spacing: clamp(0.5rem, 2vw, 2rem);
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(0, 238, 255, 0.4);
            background: linear-gradient(90deg, #ff0055, #00eeff, #ff0055);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-flow 3s linear infinite;
        }
        p {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            letter-spacing: 0.3rem;
            opacity: 0.8;
            margin-top: 1rem;
            font-weight: 300;
        }
        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 2px;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 24px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 20;
        }
        .back-btn:hover {
            background: #fff;
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(255,255,255,0.2);
        }
        
        .hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            letter-spacing: 2px;
            opacity: 0.5;
            text-transform: uppercase;
            animation: fade-in-out 4s infinite;
        }

        @keyframes gradient-flow {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        
        @keyframes fade-in-out {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;700;900&display=swap" rel="stylesheet">
    <!-- Three.js (Librería estándar para 3D en la web) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <a href="index.html" class="back-btn">← VOLVER AL CINE</a>
    
    <div id="ui">
        <h1 id="world-title">NEON PRIME</h1>
        <p>LABORATORIO VISUAL</p>
    </div>
    
    <div class="hint">Mueve el ratón para explorar el espacio</div>

    <script>
        // Configuración base de Active Theory / Three.js style
        const scene = new THREE.Scene();
        // Niebla para dar profundidad al fondo
        scene.fog = new THREE.FogExp2(0x0a0515, 0.0008);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.z = 1200;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Variables de ratón
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;
        
        // Variables para la "Velocidad Láser"
        let isWarpSpeed = false;
        let warpTimer = 0;
        let currentSpeed = 1;
        let targetSpeed = 1;
        let cameraBaseX = 0;
        let cameraBaseY = 0;
        let cameraBaseZ = 1200;
        let fovTarget = 75;
        
        let warpTargetX = 0;
        let warpTargetY = 0;
        let warpTargetZ = 1200;

        document.addEventListener('mousemove', onDocumentMouseMove);
        document.addEventListener('touchstart', onDocumentTouchStart, {passive: true});
        document.addEventListener('touchmove', onDocumentTouchMove, {passive: true});
        
        document.addEventListener('dblclick', () => {
            if (isWarpSpeed) return;
            isWarpSpeed = true;
            warpTimer = 3.5; // 3.5 segundos de velocidad láser profunda
            
            // Dirección aleatoria hacia las profundidades de la esfera de partículas
            warpTargetX = (Math.random() - 0.5) * 3000;
            warpTargetY = (Math.random() - 0.5) * 3000;
            warpTargetZ = (Math.random() - 0.5) * 3000;
        });

        // Generar un sistema de partículas (15,000 puntos)
        const geometry = new THREE.BufferGeometry();
        const particles = 15000;
        const positions = new Float32Array(particles * 3);
        const colors = new Float32Array(particles * 3);
        
        // Colores iniciales
        let currentWorld = 0;
        const worldPalettes = [
            { name: "NEON PRIME", bg: 0x0a0515, c1: 0xff0055, c2: 0x00eeff, c3: 0x5500ff, type: 'neon' }, 
            { name: "SOLARIS-VII", bg: 0x1a0a00, c1: 0xff8800, c2: 0xffd700, c3: 0xff0000, type: 'fire' },
            { name: "TOX-9", bg: 0x001105, c1: 0x00ff00, c2: 0x0088ff, c3: 0xccff00, type: 'toxic' } 
        ];
        
        let color1 = new THREE.Color(worldPalettes[0].c1);
        let color2 = new THREE.Color(worldPalettes[0].c2);
        let color3 = new THREE.Color(worldPalettes[0].c3);

        // Texturizador procedural para los planetas
        function createPlanetTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            if (type === 'neon') {
                ctx.fillStyle = '#0a0515';
                ctx.fillRect(0,0,512,512);
                for(let i=0; i<300; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? '#ff0055' : '#00eeff';
                    ctx.beginPath();
                    ctx.arc(Math.random()*512, Math.random()*512, Math.random()*15, 0, Math.PI*2);
                    ctx.fill();
                }
            } else if (type === 'fire') {
                const grad = ctx.createRadialGradient(256, 256, 0, 256, 256, 300);
                grad.addColorStop(0, '#ffcc00');
                grad.addColorStop(1, '#aa0000');
                ctx.fillStyle = grad;
                ctx.fillRect(0,0,512,512);
                for(let i=0; i<150; i++) {
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(Math.random()*512, Math.random()*512, 100, 5);
                }
            } else if (type === 'toxic') {
                ctx.fillStyle = '#001105';
                ctx.fillRect(0,0,512,512);
                for(let x=0; x<512; x+=32) {
                    for(let y=0; y<512; y+=32) {
                        ctx.fillStyle = Math.random() > 0.5 ? '#00ff00' : '#003300';
                        ctx.fillRect(x,y,32,32);
                    }
                }
            }
            return new THREE.CanvasTexture(canvas);
        }

        function generateParticles() {
            for (let i = 0; i < particles; i++) {
                // Posiciones
                positions[i * 3] = (Math.random() - 0.5) * 4000;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 4000;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 4000;

                // Colores
                let mixedColor;
                const rand = Math.random();
                if (rand < 0.33) mixedColor = color1.clone().lerp(color2, Math.random());
                else if (rand < 0.66) mixedColor = color2.clone().lerp(color3, Math.random());
                else mixedColor = color3.clone().lerp(color1, Math.random());

                colors[i * 3] = mixedColor.r;
                colors[i * 3 + 1] = mixedColor.g;
                colors[i * 3 + 2] = mixedColor.b;
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        }
        generateParticles();

        const material = new THREE.PointsMaterial({
            size: 3,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthTest: false,
            transparent: true,
            opacity: 0.8
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // Núcleo Wireframe
        const coreGeo = new THREE.IcosahedronGeometry(200, 2);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.1 });
        const core = new THREE.Mesh(coreGeo, coreMat);
        scene.add(core);

        // Esfera Portal (Mundo alternativo)
        const portalGeo = new THREE.SphereGeometry(150, 32, 32);
        const portalMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.95 });
        const portal = new THREE.Mesh(portalGeo, portalMat);
        portal.visible = false;
        scene.add(portal);

        function updatePortalAppearance() {
            const nextWorld = worldPalettes[(currentWorld + 1) % worldPalettes.length];
            portalMat.map = createPlanetTexture(nextWorld.type);
            portalMat.needsUpdate = true;
        }

        // Raycaster para el clic en el portal
        const raycaster = new THREE.Raycaster();
        const mouseVector = new THREE.Vector2();

        document.addEventListener('click', (event) => {
            if (!portal.visible) return;
            mouseVector.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouseVector.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouseVector, camera);
            const intersects = raycaster.intersectObject(portal);
            
            if (intersects.length > 0) {
                changeWorld();
            }
        });

        function changeWorld() {
            currentWorld = (currentWorld + 1) % worldPalettes.length;
            portal.visible = false;
            
            // Disparar un salto hiperespacial para camuflar la transición
            isWarpSpeed = true;
            warpTimer = 3.0;
            warpTargetX = (Math.random() - 0.5) * 3000;
            warpTargetY = (Math.random() - 0.5) * 3000;
            warpTargetZ = (Math.random() - 0.5) * 3000;

            const w = worldPalettes[currentWorld];
            scene.fog.color.setHex(w.bg);
            document.body.style.backgroundColor = '#' + w.bg.toString(16).padStart(6, '0');
            document.getElementById('world-title').innerText = w.name;
            
            color1.setHex(w.c1);
            color2.setHex(w.c2);
            color3.setHex(w.c3);
            generateParticles();
        }

        // Bucle de animación (60fps)
        const clock = new THREE.Clock();
        let accumulatedTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            render();
        }

        function render() {
            const delta = clock.getDelta();
            const timeRaw = clock.getElapsedTime();
            
            // Lógica de Velocidad Láser y desplazamiento
            if (isWarpSpeed) {
                warpTimer -= delta;
                targetSpeed = 15.0; 
                fovTarget = 140; 
                
                // Mover base de la cámara hacia el objetivo aleatorio
                cameraBaseX += (warpTargetX - cameraBaseX) * 0.03;
                cameraBaseY += (warpTargetY - cameraBaseY) * 0.03;
                cameraBaseZ += (warpTargetZ - cameraBaseZ) * 0.03;

                if (warpTimer <= 0) {
                    isWarpSpeed = false;
                    // Al detenerse, probabilidad de aparecer un portal (planeta)
                    if (Math.random() > 0.4 && !portal.visible) {
                        updatePortalAppearance();
                        portal.position.set(
                            cameraBaseX + (Math.random() - 0.5) * 800,
                            cameraBaseY + (Math.random() - 0.5) * 800,
                            cameraBaseZ - 500 - Math.random() * 500
                        );
                        portal.visible = true;
                    }
                }
            } else {
                targetSpeed = 1.0;
                fovTarget = 75;
                // La cámara vuelve lentamente a la órbita base (1200) si no hay portal a la vista
                if (!portal.visible) {
                    cameraBaseX += (0 - cameraBaseX) * 0.005;
                    cameraBaseY += (0 - cameraBaseY) * 0.005;
                    cameraBaseZ += (1200 - cameraBaseZ) * 0.005;
                }
            }
            
            // Inercia de frenada / aceleración
            currentSpeed += (targetSpeed - currentSpeed) * 0.03;
            camera.fov += (fovTarget - camera.fov) * 0.03;
            camera.updateProjectionMatrix();

            accumulatedTime += delta * currentSpeed * 0.1;
            const time = accumulatedTime;

            // Rotación general
            particleSystem.rotation.y = time;
            particleSystem.rotation.z = time * 0.5;
            core.rotation.x = time * 2;
            core.rotation.y = time * 3;

            // Animación del portal
            if (portal.visible) {
                portal.rotation.y += 0.05;
                portal.scale.setScalar(1.0 + Math.sin(timeRaw * 5) * 0.1);
            }

            // Físicas de cámara y Parallax
            targetX = mouseX * 1.5;
            targetY = mouseY * 1.5;
            
            camera.position.x = cameraBaseX + targetX;
            camera.position.y = cameraBaseY - targetY;
            camera.position.z = cameraBaseZ; 
            
            // Siempre miramos al centro del universo, esto crea una sensación vertiginosa al viajar
            camera.lookAt(scene.position);

            // Deformar partículas sutilmente
            const posArray = particleSystem.geometry.attributes.position.array;
            for(let i = 0; i < particles * 3; i += 3) {
                posArray[i] += Math.sin(time * 5 + posArray[i+1] * 0.005) * 0.3;
                posArray[i+1] += Math.cos(time * 5 + posArray[i] * 0.005) * 0.3;
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        // Eventos de usuario
        function onDocumentMouseMove(event) {
            mouseX = event.clientX - windowHalfX;
            mouseY = event.clientY - windowHalfY;
        }
        function onDocumentTouchStart(event) {
            if (event.touches.length === 1) {
                mouseX = event.touches[0].pageX - windowHalfX;
                mouseY = event.touches[0].pageY - windowHalfY;
            }
        }
        function onDocumentTouchMove(event) {
            if (event.touches.length === 1) {
                mouseX = event.touches[0].pageX - windowHalfX;
                mouseY = event.touches[0].pageY - windowHalfY;
            }
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
